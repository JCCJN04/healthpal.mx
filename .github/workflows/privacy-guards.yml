name: Privacy Guards

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  privacy-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify privacy controls
        run: npm run privacy:verify

      - name: Verify Phase 4 readiness
        run: npm run privacy:phase4:readiness

      - name: Build
        run: npm run build
