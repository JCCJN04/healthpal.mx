# Este workflow fue consolidado en ci.yml (job: privacy).
# Se mantiene como alias por compatibilidad con branch protection rules existentes.
# Si actualizas las branch protection rules en GitHub para requerir "CI / Privacy Checks",
# puedes eliminar este archivo.
name: Privacy Guards (legacy alias)

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  privacy-checks:
    name: Privacy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify privacy controls
        run: npm run privacy:verify

      - name: Verify Phase 4 readiness
        run: npm run privacy:phase4:readiness
